<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign In | Book Nook</title>
</head>

<body>
    <header class="header">
        <h1>Book Nook</h1>
    </header>

    <section class="sidebar">
        <a href="index.html">Home</a>
        <a href="currentBooks.html">Current Books</a>
        <a href="upNext.html">Up Next</a>
        <a href="finishedBooks.html">Finished Books</a>
        <a href="favoriteBooks.html">Favorite Books</a>
    </section>

    <main class="main auth-page">
        <div class="auth-card">
            <h2>Sign In</h2>
            <form id="signinForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Your password" required>
                </div>
                <div id="message" class="auth-message"></div>
                <button type="submit" class="primary-button">Sign In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </main>

    <script>
        const signinForm = document.getElementById('signinForm');
        const messageBox = document.getElementById('message');

        signinForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageBox.textContent = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const response = await fetch('/api/signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });

            const result = await response.json();
            if (response.ok) {
                localStorage.setItem("token", result.access_token)  // for storing token
                window.location.href = 'index.html';

            } else {
                messageBox.textContent = result.detail || result.message || 'Sign in failed.';
            }
        });
    </script>
</body>

</html>
