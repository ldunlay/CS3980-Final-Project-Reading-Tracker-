<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Up Next!</title>
</head>

<body>
    <header class="header">
        <h1>Book Nook</h1>
    </header>

    <section class="sidebar">

        <a href="/">Home</a>
        <a href="/current-books">Current Books</a>
        <a href="/up-next">Up Next</a>
        <a href="/finished-books">Finished Books</a>
        <a href="/favorite-books">Favorite Books</a>
    </section>

    <main class="main">
        <h2>Reading List</h2>
        <ul id="readingList"></ul>
    </main>

    <script>
        const readingList = document.getElementById('readingList');

        let books = JSON.parse(localStorage.getItem('readingList')) || [];

        function displayBooks() {
            readingList.innerHTML = '';
            books.forEach((book, index) => {
                const li = document.createElement('li');
                li.textContent = book;
                const removeButton = document.createElement('button');
                removeButton.textContent = 'Remove';
                removeButton.onclick = () => {
                    books.splice(index, 1);
                    localStorage.setItem('readingList', JSON.stringify(books));
                    displayBooks();
                };
                li.appendChild(removeButton);
                readingList.appendChild(li);
            });
        }

        displayBooks();
    </script>
</body>

</html>
