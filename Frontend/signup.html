<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Sign Up | Book Nook</title>
</head>

<body>
    <header class="header">
        <h1>Book Nook</h1>
    </header>

    <section class="sidebar">
        <a href="/">Home</a>
        <a href="currentBooks.html">Current Books</a>
        <a href="upNext.html">Up Next</a>
        <a href="finishedBooks.html">Finished Books</a>
        <a href="favoriteBooks.html">Favorite Books</a>
    </section>

    <main class="main auth-page">
        <div class="auth-card">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div id="message" class="auth-message"></div>
                <button type="submit" class="primary-button">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="signin.html">Sign in</a></p>
        </div>
    </main>

    <script>
        const signupForm = document.getElementById('signupForm');
        const messageBox = document.getElementById('message');

        signupForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageBox.textContent = '';
            messageBox.classList.remove('success');

            const username = document.getElementById('username').value.trim();
            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value.trim();

            const formData = new FormData();
            formData.append('username', username);
            formData.append('name', name);
            formData.append('password', password);

            // FIX 4: URL updated to /api/users/signup to match your router prefix
            const response = await fetch('/api/users/signup', {
                method: 'POST',
                body: formData,
            });

            const result = await response.json();
            if (response.ok) {
                messageBox.classList.add('success');
                messageBox.textContent = result.message || 'Account created successfully! Redirecting to sign in...';
                setTimeout(() => {
                    // Redirect to the correctly mapped signin page
                    window.location.href = 'signin.html';
                }, 1800);
            } else {
                messageBox.classList.remove('success');
                // Displays specific error (e.g., "User already exists") from FastAPI
                messageBox.textContent = result.detail || 'Sign up failed.';
            }
        });
    </script>
</body>

</html>
