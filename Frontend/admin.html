<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Book Nook — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>
<body>
    <section class="sidebar">
        <div class="sidebar-brand">📚 Book Nook</div>
        <a href="index.html">Home</a>
        <a href="currentBooks.html">Current Books</a>
        <a href="upNext.html">Up Next</a>
        <a href="finishedBooks.html">Finished Books</a>
        <a href="admin.html" class="active admin-only">Admin</a>
        <a href="#" onclick="redirectToSignin()">Logout</a>
    </section>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">Admin <span>Dashboard</span></h1>
        </div>

        <!-- Users -->
        <h2 class="mt-4 mb-2">All Users</h2>
        <div id="user-filters" class="mb-2"></div>
        <div id="users-table-wrap" class="table-responsive mb-5">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>

        <!-- Current Books -->
        <h2 class="mt-4 mb-2">All Current Books</h2>
        <div id="current-filters" class="mb-2"></div>
        <div class="table-responsive mb-5">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th><th>Author</th><th>Owner</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="current-tbody"></tbody>
            </table>
        </div>

        <!-- Finished Books -->
        <h2 class="mt-4 mb-2">All Finished Books</h2>
        <div id="finished-filters" class="mb-2"></div>
        <div class="table-responsive mb-5">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th><th>Author</th><th>Owner</th><th>Rating</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="finished-tbody"></tbody>
            </table>
        </div>

        <!-- Up Next -->
        <h2 class="mt-4 mb-2">All Up Next Books</h2>
        <div id="upnext-filters" class="mb-2"></div>
        <div class="table-responsive mb-5">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th><th>Author</th><th>Owner</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="upnext-tbody"></tbody>
            </table>
        </div>
    </main>

    <!-- ── Details Modal ── -->
    <div id="modal-details" class="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="details-title"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-2" id="details-body"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script>applyAdminUI();</script>
    <script>requireAdmin();</script>
</body>
</html>
